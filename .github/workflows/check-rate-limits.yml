name: "Check Rate Limits"
on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  check-rate-limits:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    name: Check Rate Limit API
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Check Rates
        id: api_results
        uses: ./.github/actions/check-api-rates
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dump results
        run: |
          echo ${{ steps.api_results.outputs.result }}
